<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feature Requests</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
/* ================= THEME ================= */
:root {
    --bg:#f5f5f7;
    --card:#fff;
    --text:#000;
    --sub:#666;
    --border:#e5e5e7;
}

@media (prefers-color-scheme: dark) {
:root {
    --bg:#0b0b0c;
    --card:#1c1c1e;
    --text:#fff;
    --sub:#9ca3af;
    --border:#2a2a2c;
}}

/* ================= BASE ================= */
body {
    font-family: -apple-system, BlinkMacSystemFont,
                 "SF Pro Text", system-ui, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 16px;
}

#home, #add, #detail {
    max-width: 520px;
    margin: 0 auto;
}

/* ================= HEADER (FIXED CENTER) ================= */
.header {
    display: grid;
    grid-template-columns: 40px 1fr 40px;
    align-items: center;
    margin-bottom: 12px;
}

.header h2,
.header h3 {
    text-align: center;
    margin: 0;
}

.icon-btn {
    width:36px;
    height:36px;
    border-radius:999px;
    border:none;
    background:var(--card);
    color:var(--text);
    font-size:18px;
}

/* ================= INPUTS ================= */
.input-row {
    display:grid;
    grid-template-columns: 1fr 120px;
    gap:8px;
    margin-bottom:12px;
}

input, textarea, select {
    width:100%;
    box-sizing:border-box;
    padding:12px;
    border-radius:12px;
    border:1px solid var(--border);
    background:var(--card);
    color:var(--text);
    font-size:16px;
}

textarea {
    resize:none;
    height:90px;
}

/* spacing FIX */
#add input,
#add textarea {
    margin-bottom: 12px;
}

/* ================= BUTTON ================= */
button {
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    background:var(--text);
    color:var(--bg);
    font-size:16px;
    font-weight:600;
}

/* ================= CARD ================= */
.feature {
    background:var(--card);
    padding:14px;
    border-radius:16px;
    margin-top:10px;
    border:1px solid var(--border);
}

.feature-title {
    font-weight:600;
    margin-bottom:6px;
    word-break:break-word;
}

/* ================= LAYOUT ================= */
.feature-bottom {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
}

/* ================= TAGS ================= */
.tag {
    font-size:10px;
    background:var(--border);
    padding:3px 8px;
    border-radius:999px;
    margin-right:4px;
}

/* ================= STATUS ================= */
.badge {
    font-size:11px;
    padding:4px 10px;
    border-radius:999px;
    text-transform:capitalize;
}

.badge.open { background:#444; color:#fff; }
.badge.in_progress { background:#f59e0b; color:#000; }
.badge.done { background:#10b981; color:#000; }

/* 🎀 NEW: coming soon */
.badge.coming_soon {
    background:#ff4d8d;
    color:#fff;
}

/* ================= VOTE ================= */
.vote-btn {
    width:auto;
    padding:6px 10px;
    border-radius:999px;
}

/* ================= HIDE ================= */
.hidden { display:none; }

</style>
</head>

<body>

<!-- ================= HOME ================= -->
<div id="home">

<div class="header">
    <div></div>
    <h2>Feature Requests 🚀</h2>
    <button class="icon-btn" onclick="showPage('add')">+</button>
</div>

<div class="input-row">
    <input id="search" placeholder="Search..." oninput="applyFilters()" />
    <select id="statusFilter" onchange="applyFilters()">
        <option value="">All</option>
        <option value="open">Open</option>
        <option value="in_progress">In progress</option>
        <option value="done">Done</option>
    </select>
</div>

<div id="list"></div>

</div>

<!-- ================= ADD ================= -->
<div id="add" class="hidden">

<div class="header">
    <button class="icon-btn" onclick="showPage('home')">←</button>
    <h3>Add Feature</h3>
    <div></div>
</div>

<input id="title" placeholder="Title" />
<textarea id="descInput" placeholder="Description"></textarea>
<input id="tags" placeholder="Tags (UI, Performance)" />

<button onclick="addFeature()">Submit</button>

</div>

<!-- ================= DETAIL ================= -->
<div id="detail" class="hidden">

<div class="header">
    <button class="icon-btn" onclick="showPage('home')">←</button>
    <h3 id="detailTitle"></h3>
    <div></div>
</div>

<div id="detailTags"></div>
<p id="detailDesc"></p>

<button id="detailVote"></button>

</div>

<script>
const supabaseClient = window.supabase.createClient(
    "https://ixcylpmyupmoarebbhjy.supabase.co",
    "sb_publishable_c1Wmk7ON_QO4xorRQmkXNg_23q-OcEl"
);

let features = [];

/* NAV */
function showPage(p) {
    ["home","add","detail"].forEach(id =>
        document.getElementById(id).classList.add("hidden")
    );
    document.getElementById(p).classList.remove("hidden");
}

/* TRENDING ALGORITHM */
function getScore(f) {
    const votes = f.votes || 0;
    const age = (Date.now() - new Date(f.created_at || Date.now())) / 10000000;
    return votes * 10 - age;
}

/* LOAD */
async function load() {
    const { data } = await supabaseClient
        .from("features")
        .select("*");

    features = data || [];

    features.sort((a,b) => getScore(b) - getScore(a));

    render(features);
}

/* FILTER */
function applyFilters() {
    const search = document.getElementById("search").value.toLowerCase();
    const status = document.getElementById("statusFilter").value;

    const filtered = features.filter(f => {
        return (
            (!search ||
                f.title?.toLowerCase().includes(search) ||
                f.description?.toLowerCase().includes(search)
            ) &&
            (!status || (f.status || "open") === status)
        );
    });

    render(filtered);
}

/* RENDER */
function render(data) {
    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(f => {
        const div = document.createElement("div");
        div.className = "feature";

        div.innerHTML = `
            <div class="feature-title">${f.title}</div>

            <div>
                ${(f.tags || []).map(t => `<span class="tag">${t}</span>`).join("")}
            </div>

            <div class="feature-bottom">
                <span class="badge ${f.status || 'open'}">
                    ${(f.status || 'open').replace("_"," ")}
                </span>

                <button class="vote-btn">👍 ${f.votes}</button>
            </div>
        `;

        div.onclick = (e) => {
            if (e.target.tagName === "BUTTON") return;
            openDetail(f);
        };

        const btn = div.querySelector("button");
        btn.onclick = (e) => {
            e.stopPropagation();
            vote(f.id, f.votes);
        };

        list.appendChild(div);
    });
}

/* DETAIL */
function openDetail(f) {
    document.getElementById("detailTitle").innerText = f.title;
    document.getElementById("detailDesc").innerText = f.description;

    document.getElementById("detailTags").innerHTML =
        (f.tags || []).map(t => `<span class="tag">${t}</span>`).join("");

    const btn = document.getElementById("detailVote");
    btn.innerText = "👍 " + f.votes;
    btn.onclick = () => vote(f.id, f.votes);

    showPage("detail");
}

/* VOTE (GLOBAL LOCK) */
function getVoted() {
    return JSON.parse(localStorage.getItem("voted") || "[]");
}

function saveVoted(v) {
    localStorage.setItem("voted", JSON.stringify(v));
}

async function vote(id, votes) {
    let voted = getVoted();
    if (voted.includes(id)) return;

    await supabaseClient
        .from("features")
        .update({ votes: votes + 1 })
        .eq("id", id);

    voted.push(id);
    saveVoted(voted);

    load();
}

/* ADD */
async function addFeature() {
    const title = document.getElementById("title").value.trim();
    const description = document.getElementById("descInput").value.trim();
    const tags = document.getElementById("tags").value
        .split(",")
        .map(t => t.trim());

    if (title.length < 3) return;

    await supabaseClient.from("features").insert([{
        title,
        description,
        tags,
        votes:0,
        status:"open"
    }]);

    showPage("home");
    load();
}

/* START */
load();
</script>

</body>
</html>
