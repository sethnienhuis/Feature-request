<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feature Requests</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    font-family: -apple-system, sans-serif;
    background: #f5f5f7;
    padding: 16px;
    margin: 0;
}

h1 {
    font-size: 22px;
    margin-bottom: 16px;
}

/* INPUT ROW */
.input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 16px;
}

button {
    padding: 12px 16px;
    border-radius: 10px;
    border: none;
    background: black;
    color: white;
    font-size: 16px;
}

/* FEATURE CARD */
.feature {
    background: white;
    padding: 14px;
    margin-top: 10px;
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* TOP ROW */
.feature-top {
    font-size: 15px;
    line-height: 1.4;
}

/* BOTTOM ROW */
.feature-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* BADGE */
.badge {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 999px;
}

/* STATUS COLORS */
.badge.open {
    background: #e5e7eb;
    color: #374151;
}

.badge.coming_soon {
    background: #dbeafe;
    color: #1d4ed8;
}

.badge.in_progress {
    background: #fef3c7;
    color: #92400e;
}

.badge.done {
    background: #d1fae5;
    color: #065f46;
}

/* VOTE BUTTON */
.vote-btn {
    font-size: 14px;
    padding: 8px 12px;
    border-radius: 999px;
}
    
button:disabled {
    background: #a3a3a3;
    cursor: not-allowed;
}
</style>
</head>

<body>

<h1>Feature Requests 🚀</h1>

<div class="input-row">
    <input id="input" placeholder="Suggest a feature..." />
    <button onclick="addFeature()">Add</button>
</div>

<div id="list"></div>

<script>
function getVoted() {
    return JSON.parse(localStorage.getItem("voted") || "[]");
}

function saveVoted(ids) {
    localStorage.setItem("voted", JSON.stringify(ids));
}

// ✅ SUPABASE v2 INIT
const { createClient } = supabase;

const supabaseClient = createClient(
    "https://ixcylpmyupmoarebbhjy.supabase.co",
    "sb_publishable_c1Wmk7ON_QO4xorRQmkXNg_23q-OcEl"
);

// 📥 LOAD FEATURES
async function loadFeatures() {
    const { data, error } = await supabaseClient
        .from("features")
        .select("*")
        .order("votes", { ascending: false });

    if (error) {
        console.log("LOAD ERROR:", error);
        return;
    }

    render(data || []);
}

// ➕ ADD FEATURE
async function addFeature() {
    const input = document.getElementById("input");
    const value = input.value.trim();

    if (!value) return;

    const { error } = await supabaseClient
        .from("features")
        .insert([
            {
                text: value,
                votes: 0,
                status: "open"
            }
        ]);

    if (error) {
        console.log("INSERT ERROR:", error);
        return;
    }

    input.value = "";
    loadFeatures();
}

// 👍 VOTE
async function vote(id, votes) {
    let voted = getVoted();

    if (voted.includes(id)) {
        alert("You already voted!");
        return;
    }

    const { error } = await supabaseClient
        .from("features")
        .update({ votes: votes + 1 })
        .eq("id", id);

    if (error) {
        console.log("UPDATE ERROR:", error);
        return;
    }

    voted.push(id);
    saveVoted(voted);

    loadFeatures();
}

// 🎨 RENDER
function render(features) {
    const list = document.getElementById("list");
    list.innerHTML = "";

    const voted = getVoted();

    features.forEach(f => {
        const div = document.createElement("div");
        div.className = "feature";

        const status = f.status || "open";
        const hasVoted = voted.includes(f.id);

        div.innerHTML = `
            <div class="feature-top">
                ${f.text}
            </div>
        
            <div class="feature-bottom">
                <span class="badge ${status}">
                    ${status.replace("_", " ")}
                </span>
        
                <button 
                    class="vote-btn"
                    onclick="vote(${f.id}, ${f.votes})"
                    ${hasVoted ? "disabled" : ""}
                >
                    👍 ${f.votes}
                </button>
            </div>
        `;

        list.appendChild(div);
    });
}

// 🚀 START
loadFeatures();
</script>

</body>
</html>
