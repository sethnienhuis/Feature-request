<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feature Requests</title>
<style>
    body {
        font-family: -apple-system, sans-serif;
        background: #f5f5f7;
        padding: 40px;
        max-width: 600px;
        margin: auto;
    }

    h1 {
        text-align: center;
    }

    input, button {
        padding: 10px;
        font-size: 16px;
        margin-top: 10px;
    }

    input {
        width: 70%;
    }

    button {
        cursor: pointer;
    }

    .feature {
        background: white;
        padding: 15px;
        margin-top: 10px;
        border-radius: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .votes {
        display: flex;
        align-items: center;
        gap: 10px;
    }
</style>
</head>
<body>

<h1>Feature Requests</h1>

<input id="input" placeholder="Suggest a feature..." />
<button onclick="addFeature()">Add</button>

<div id="list"></div>

<script>
let features = JSON.parse(localStorage.getItem("features")) || [];

function save() {
    localStorage.setItem("features", JSON.stringify(features));
}

function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    features.sort((a, b) => b.votes - a.votes);

    features.forEach((f, index) => {
        const div = document.createElement("div");
        div.className = "feature";

        div.innerHTML = `
            <span>${f.text}</span>
            <div class="votes">
                <button onclick="vote(${index})">👍 ${f.votes}</button>
                <button onclick="removeFeature(${index})">🗑</button>
            </div>
        `;

        list.appendChild(div);
    });
}

function addFeature() {
    const input = document.getElementById("input");
    if (!input.value) return;

    features.push({ text: input.value, votes: 0 });
    input.value = "";

    save();
    render();
}

function vote(index) {
    features[index].votes++;
    save();
    render();
}

function removeFeature(index) {
    features.splice(index, 1);
    save();
    render();
}

render();
</script>

</body>
</html>
