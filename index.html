<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Feature Requests</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    font-family: -apple-system, sans-serif;
    background: #f5f5f7;
    padding: 40px;
    max-width: 600px;
    margin: auto;
}

.feature {
    background: white;
    padding: 15px;
    margin-top: 10px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
</style>
</head>

<body>

<h1>Feature Requests 🚀</h1>

<input id="input" placeholder="Suggest a feature..." />
<button onclick="addFeature()">Add</button>

<div id="list"></div>

<script>
console.log("SCRIPT LOADED");

// 🔒 SAFE INIT (NO DUPLICATES EVER)
const supabase = window.supabase.createClient(
    "https://ixcylpmyupmoarebbhjy.supabase.co",
    "sb_publishable_c1Wmk7ON_QO4xorRQmkXNg_23q-OcEl"
);

// 📥 LOAD FEATURES
async function loadFeatures() {
    const { data, error } = await supabase
        .from("features")
        .select("*")
        .order("votes", { ascending: false });

    if (error) {
        console.log("LOAD ERROR:", error);
        return;
    }

    render(data || []);
}

// ➕ ADD FEATURE
async function addFeature() {
    const input = document.getElementById("input");

    const value = input.value.trim();
    if (!value) return;

    const { error } = await supabase
        .from("features")
        .insert([
            {
                text: value,
                votes: 0
            }
        ]);

    if (error) {
        console.log("INSERT ERROR:", error);
        return;
    }

    input.value = "";
    loadFeatures();
}

// 👍 VOTE
async function vote(id, votes) {
    const { error } = await supabase
        .from("features")
        .update({ votes: votes + 1 })
        .eq("id", id);

    if (error) {
        console.log("UPDATE ERROR:", error);
        return;
    }

    loadFeatures();
}

// 🎨 RENDER
function render(features) {
    const list = document.getElementById("list");
    list.innerHTML = "";

    features.forEach(f => {
        const div = document.createElement("div");
        div.className = "feature";

        div.innerHTML = `
            <span>${f.text}</span>
            <button onclick="vote(${f.id}, ${f.votes})">
                👍 ${f.votes}
            </button>
        `;

        list.appendChild(div);
    });
}

// 🚀 START
loadFeatures();
</script>

</body>
</html>
